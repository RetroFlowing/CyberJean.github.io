---
layout: default
---

<article class="post h-entry">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %d, %Y" }}
      </time>
    </p>
  </header>

  <div class="post-content e-content">
    {{ content }}
  </div>

  <div class="giscus-comments" style="margin-top: 48px; padding-top: 24px; border-top: 1px solid #00ff9020;">
    <p style="color: #00ff9080; font-size: 12px; letter-spacing: 1px; margin-bottom: 16px;">> discussion</p>
    <script src="https://giscus.app/client.js"
        data-repo="CyberJean98/CyberJean.github.io"
        data-repo-id="R_kgDORt8wig"
        data-category="Announcements"
        data-category-id="DIC_kwDORt8wis4C5TYr"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="dark_dimmed"
        data-lang="en"
        crossorigin="anonymous"
        async>
    </script>
  </div>
</article>
